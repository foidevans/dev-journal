<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Journal</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main>
      <h1>Dev Journal 📓</h1>
      <p>What did you learn today?</p>

      <form id="journal-form">
        <div class="form-group">
          <label for="title">Title</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="e.g. How fs.readFile works"
            required
          />
        </div>

        <div class="form-group">
          <label for="content">What did you learn?</label>
          <textarea
            id="content"
            name="content"
            rows="6"
            placeholder="Break it down in your own words..."
            required
          ></textarea>
        </div>

        <button type="submit">Save Entry</button>
        <p id="feedback"></p>
      </form>

      <a href="/entries.html">View all entries →</a>
    </main>

    <script>
      const form = document.getElementById("journal-form");
      const feedback = document.getElementById("feedback");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        //   const title = form.title.value.trim();
        //   const content = form.content.value.trim();

        const title = document.getElementById("title").value.trim();
        const content = document.getElementById("content").value.trim();

        if (!title || !content) {
          feedback.textContent = "Please fill in both fields.";
          feedback.style.color = "red";
          return;
        }

        try {
          const res = await fetch("/api/entries", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, content }),
          });

          const data = await res.json();

          if (res.ok) {
            feedback.textContent = "Entry saved!";
            feedback.style.color = "green";
            form.reset();
          } else {
            feedback.textContent = data.error || "Something went wrong";
            feedback.style.color = "red";
          }
        } catch (err) {
          feedback.textContent = "Could not connect to server";
          feedback.style.color = "red";
        }
      });
    </script>
  </body>
</html>
